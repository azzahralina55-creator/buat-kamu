<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mau gak jadi pacar aku lagi?</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            /* Perpaduan warna Pink Keunguan yang lembut */
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }
        .container {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(216, 27, 96, 0.2);
            max-width: 400px;
            width: 90%;
        }
        .heart {
            font-size: 50px;
            color: #ba55d3; /* Ungu anggun */
            animation: beat 1s infinite alternate;
            margin-bottom: 20px;
        }
        @keyframes beat {
            to { transform: scale(1.2); }
        }
        h1 {
            color: #8a2be2; /* Ungu gelap estetik */
            font-size: 24px;
            margin-bottom: 30px;
            line-height: 1.4;
        }
        /* Tombol sejajar kiri-kanan */
        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }
        button {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        #btn-yes {
            background-color: #da70d6; /* Pink keunguan terang */
            color: white;
            box-shadow: 0 4px 15px rgba(218, 112, 214, 0.4);
        }
        #btn-yes:hover {
            background-color: #ba55d3;
            transform: scale(1.05);
        }
        #btn-no {
            background-color: #e6e6fa; /* Lavender pucat */
            color: #6a5acd;
        }
        #btn-no:hover {
            background-color: #d8bfd8;
        }
        .audio-container {
            margin-top: 15px;
            border-top: 1px dashed #da70d6;
            padding-top: 15px;
        }
        .audio-title {
            font-size: 12px;
            color: #8a2be2;
            margin-bottom: 5px;
            font-weight: bold;
        }
        audio {
            width: 100%;
            max-width: 280px;
            height: 32px;
        }
        /* Style untuk pop-up jawaban */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(230, 230, 250, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 350px;
            width: 85%;
        }
        .modal-content h2 {
            color: #8a2be2;
            font-size: 22px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="heart">🔮💜</div>
        <h1>kamu mau ga jadi pacar aku lagi?</h1>
        
        <div class="btn-container">
            <button id="btn-yes" onclick="klikYes()">Yes</button>
            <button id="btn-no" onclick="klikNo()">No</button>
        </div>

        <!-- Bagian Pemutar Lagu -->
        <div class="audio-container">
            <p class="audio-title">🎵 Putar lagu ini sambil baca yaa :</p>
            <audio id="myAudio" controls loop>
                <source src="lagu.mp3" type="audio/mpeg">
                Browser kamu tidak mendukung pemutar musik.
            </audio>
        </div>
    </div>

    <!-- Pop-up Jawaban -->
    <div id="resultModal" class="modal">
        <div class="modal-content">
            <h2 id="modalText">Pesan Jawaban</h2>
        </div>
    </div>

    <script>
        const modal = document.getElementById('resultModal');
        const modalText = document.getElementById('modalText');
        const audio = document.getElementById('myAudio');

        function klikYes() {
            // Teks kalau dia klik YES
            modalText.innerHTML = "yes akhirnya balikan, makasii sayangku, i love u 🤍";
            modal.style.display = 'flex';
            putarLaguOtomatis();
        }

        function klikNo() {
            // Teks cerdik kalau dia nekat klik NO
            modalText.innerHTML = "yauda aku yang jadi pacar km kalo gitu 😛";
            modal.style.display = 'flex';
            putarLaguOtomatis();
        }

        function putarLaguOtomatis() {
            audio.play().catch(function(error) {
                console.log("Musik memerlukan pemutaran manual di beberapa browser.");
            });
        }

        // Menutup pop-up jika area luar kotak diklik
        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }
    </script>
</body>
</html>
